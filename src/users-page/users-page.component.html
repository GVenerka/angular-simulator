<button class="update-button" id="update-button" (click)="loadUsers()">
  <img src="/images/icons/updates-icon.svg">
</button>
<div class="wrapper">
  <app-create-user (createUser)="createUser($event)"/>
  <h1 class="title">список пользователей</h1>
  <app-users-filter (filteringUser)="onFilterChange($event)" />
  <div class="users-list">
    @for (user of filteredUsers$ | async; track user.id) {
      <app-user-card [user]="user" (deleteUser)="deleteUser($event)"/>
    } @empty {
    <p class="empty-message">Нет пользователей для отображения</p>
    }
  </div>
</div>
